<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Panel Administrador</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg, #1f4037, #99f2c8);
}

.card{
    border-radius: 20px;
}
</style>

</head>

<body>

<div class="container py-5">

<h1 class="text-center text-white mb-4">👑 Panel Administrador</h1>

<div class="text-center mb-4">
<a href="/logout" class="btn btn-danger">Cerrar sesión</a>
</div>

<div class="row g-4">
{% for c in candidatas %}
<div class="col-md-4">
<div class="card p-4">

<form method="POST" action="/editar" enctype="multipart/form-data">

<input type="hidden" name="id" value="{{c.id}}">

<img src="{{ url_for('static', filename='fotos/' + c.foto) }}" class="img-fluid mb-3">

<label>Nombre:</label>
<input type="text" name="nombre" value="{{c.nombre}}" class="form-control mb-3">

<label>Cambiar Foto:</label>
<input type="file" name="foto" class="form-control mb-3">

<button class="btn btn-warning w-100">Guardar Cambios</button>

</form>

</div>
</div>
{% endfor %}
</div>

</div>

</body>
</html>
