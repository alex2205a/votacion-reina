<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cecyt | Reina 2026</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--gold:#d4af37;
--dark-gold:#996515;
}

body{
background: linear-gradient(to bottom right, #d61313, #f3f6fa);
font-family:'Poppins', sans-serif;
min-height:100vh;
}

.main-container{
background:white;
border-radius:30px;
box-shadow:0 25px 50px rgba(0,0,0,0.08);
}

.titulo-gala{
font-family:'Playfair Display', serif;
font-size:3rem;
letter-spacing:2px;
background: linear-gradient(to right, var(--dark-gold), var(--gold));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:40px;
}

.card-candidata{
border:none;
border-radius:25px;
overflow:hidden;
transition:.4s;
cursor:pointer;
}

.card-candidata:hover{
transform:translateY(-10px);
box-shadow:0 20px 40px rgba(212,175,55,.25);
}

.img-wrapper{
height:320px;
overflow:hidden;
}

.card-candidata img{
width:100%;
height:100%;
object-fit:cover;
}

.input-matricula{
border:2px solid var(--gold);
border-radius:15px;
text-align:center;
font-size:1.1rem;
}

.btn-votar-principal{
background:linear-gradient(45deg,var(--dark-gold),var(--gold));
border:none;
color:white;
padding:15px 50px;
font-size:1.2rem;
border-radius:50px;
}

.card-selected{
border:4px solid var(--gold);
background:#fffdf6;
}

.status-badge{
font-size:.8rem;
font-weight:600;
}

</style>
</head>

<body>

<div class="container py-5">

<div class="text-end mb-4">

<button class="btn btn-outline-dark btn-sm opacity-50" onclick="mostrarLogin()">
Acceso Administrador
</button>

<div id="loginAdmin" style="display:none;" class="mt-3">

<form method="POST" action="/admin_login"
class="bg-white p-3 rounded shadow d-inline-block">

<input type="password"
name="password"
placeholder="Key"
required
class="form-control form-control-sm d-inline w-auto me-2">

<button class="btn btn-dark btn-sm">Validar</button>

</form>

</div>

</div>


<div class="main-container p-4 p-md-5">

<header class="text-center">

<p class="text-uppercase mb-0"
style="color:var(--gold);font-weight:600;">
Cecyte 11 Oxchuc
</p>

<h1 class="titulo-gala">
Elección Reina 2026
</h1>

</header>


<form method="POST" action="/votar">


<div class="row justify-content-center mb-5">

<div class="col-md-6">

<label class="form-label d-block text-center mb-3">
Matrícula Escolar
</label>

<input
type="text"
name="matricula"
class="form-control input-matricula"
placeholder="Introduce tu Matrícula"
required>

</div>

</div>


<div class="row g-4">

{% for c in candidatas %}

<div class="col-lg-3 col-md-4 col-sm-6">

<div class="card card-candidata shadow-sm"
onclick="seleccionar({{c.id}}, this)">

<div class="img-wrapper">

<img
src="{{ url_for('static', filename='fotos/' + c.foto) }}"
alt="{{c.nombre}}">

</div>

<div class="card-body text-center">

<h5 class="fw-bold mb-1">
{{c.nombre}}
</h5>

<p class="text-muted small mb-2">
Candidata #0{{loop.index}}
</p>

<input
type="radio"
name="candidata"
value="{{c.id}}"
id="c{{c.id}}"
hidden
required>

<div
class="status-badge py-2 rounded border text-muted"
id="badge-{{c.id}}">

Seleccionar

</div>

</div>

</div>

</div>

{% endfor %}

</div>


<div class="text-center mt-5">

<button type="submit" class="btn btn-votar-principal">
VOTAR
</button>

</div>

</form>

</div>

</div>


<script>

function mostrarLogin(){

const login=document.getElementById("loginAdmin");

login.style.display =
login.style.display==="none"
? "block"
: "none";

}


function seleccionar(id, elemento){

document.querySelectorAll(".card-candidata").forEach(card=>{

card.classList.remove("card-selected");

const badge=card.querySelector(".status-badge");

badge.innerHTML="Seleccionar";

badge.classList.remove("bg-dark","text-white");

badge.classList.add("text-muted");

});

document.getElementById("c"+id).checked=true;

elemento.classList.add("card-selected");

const activeBadge=elemento.querySelector(".status-badge");

activeBadge.innerHTML="Seleccionada ✅";

activeBadge.classList.remove("text-muted");

activeBadge.classList.add("bg-dark","text-white");

}

</script>

</body>
</html>
